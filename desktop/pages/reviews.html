<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - MusicWorld</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/splash.css">
  <link rel="stylesheet" href="../css/player.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .reviews-header {
      position: relative;
      padding: var(--space-xl) 0;
      color: var(--color-white);
      overflow: hidden;
      min-height: 200px;
      display: flex;
      align-items: center;
    }
    .reviews-header__bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=1200&q=80') center/cover no-repeat;
      filter: brightness(0.3);
    }
    .reviews-header__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(13,71,161,0.9) 0%, rgba(21,101,192,0.7) 100%);
    }
    .reviews-header .container { position: relative; z-index: 2; }
    .reviews-header h1 { color: var(--color-white); font-size: 2.2rem; font-weight: 800; }
    .review-card { background: var(--color-surface); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: var(--space-lg); height: 100%; transition: transform var(--transition-normal), box-shadow var(--transition-normal); }
    .review-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .review-card__stars { color: #F59E0B; font-size: 0.9rem; margin-bottom: var(--space-sm); }
    .review-card__body { font-size: 0.95rem; color: var(--color-text); line-height: 1.7; margin-bottom: var(--space-md); }
    .review-card__footer { display: flex; align-items: center; justify-content: space-between; }
    .review-card__author { font-weight: 600; font-size: 0.875rem; }
    .review-card__date { font-size: 0.8rem; color: var(--color-text-muted); }
    .review-card__target { font-size: 0.8rem; color: var(--color-primary); text-decoration: none; }
    .review-card__target:hover { text-decoration: underline; }
    .review-type-badge { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: var(--radius-pill); text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-album { background: var(--color-primary); color: white; }
    .badge-artist { background: var(--color-accent); color: white; }
  </style>
</head>
<body>
  <div id="splash-screen"><div class="splash__logo">Music<span>World</span></div><div style="position:relative;display:flex;align-items:center;justify-content:center;"><div class="splash__pulse"></div><i class="fas fa-music splash__icon"></i></div></div>
  <div id="navbar-placeholder"></div>
  <div class="modal fade" id="auth-modal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title"><i class="fas fa-music me-2"></i>MusicWorld</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-4"><div id="auth-prompt-msg" class="d-none"></div><ul class="nav nav-tabs mb-4"><li class="nav-item"><button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane">Sign In</button></li><li class="nav-item"><button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane">Register</button></li></ul><div class="tab-content"><div class="tab-pane fade show active" id="login-pane"><div id="login-error" class="alert alert-danger d-none py-2 small"></div><form id="login-form"><div class="mb-3"><label class="form-label small fw-semibold">Email</label><input type="email" id="login-email" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Password</label><input type="password" id="login-password" class="form-control" required></div><button type="submit" class="btn btn-primary">Sign In</button></form></div><div class="tab-pane fade" id="register-pane"><div id="register-error" class="alert alert-danger d-none py-2 small"></div><form id="register-form"><div class="mb-3"><label class="form-label small fw-semibold">Username</label><input type="text" id="reg-username" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Email</label><input type="email" id="reg-email" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Password</label><input type="password" id="reg-password" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Confirm Password</label><input type="password" id="reg-confirm" class="form-control" required></div><button type="submit" class="btn btn-primary">Create Account</button></form></div></div></div></div></div></div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100"><div id="download-toast" class="toast align-items-center text-bg-primary border-0"><div class="d-flex"><div class="toast-body"><i class="fas fa-download me-2"></i>Downloading album...</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>

  <section class="reviews-header">
    <div class="reviews-header__bg"></div>
    <div class="reviews-header__overlay"></div>
    <div class="container">
      <h1><i class="fas fa-star me-2"></i>Reviews</h1>
      <p class="text-white-50">What critics and fans are saying about albums and artists.</p>
    </div>
  </section>

  <main class="container py-5">
    <div class="row g-4" id="reviews-grid"></div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="music-player">
    <img id="player-art" class="player__art" src="../assets/images/placeholder.jpg" alt="Now Playing">
    <div class="player__info"><div class="player__title" id="player-title">Select a track</div><div class="player__artist" id="player-artist">—</div></div>
    <div class="player__controls"><button id="player-prev-btn"><i class="fas fa-backward-step"></i></button><button id="player-play-btn"><i class="fas fa-play"></i></button><button id="player-next-btn"><i class="fas fa-forward-step"></i></button></div>
    <div class="player__volume"><i class="fas fa-volume-low"></i><input type="range" id="player-volume" min="0" max="1" step="0.05" value="0.8"></div>
  </div>

  <script src="../js/data/music-data.js"></script>
  <script src="../js/data/articles-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/player.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/splash.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', async function() {
    await fetch('../pages/navbar.html').then(r=>r.text()).then(h=>{document.getElementById('navbar-placeholder').innerHTML=h;Auth.updateNavbar();});
    await fetch('../pages/footer.html').then(r=>r.text()).then(h=>{document.getElementById('footer-placeholder').innerHTML=h;});

    var grid = document.getElementById('reviews-grid');
    (MusicData.reviews||[]).forEach(function(rev){
      var stars = '';
      for(var i=0;i<5;i++) stars += '<i class="fas fa-star'+(i<rev.rating?'':'-o')+'"></i>';
      var targetName = '';
      var targetLink = '#';
      if (rev.targetType === 'album') {
        var al = (MusicData.albums||[]).find(function(a){return a.id===rev.targetId;});
        if (al) { targetName = al.title; targetLink = 'album.html?id='+al.id; }
      } else {
        var ar = (MusicData.artists||[]).find(function(a){return a.id===rev.targetId;});
        if (ar) { targetName = ar.name; targetLink = 'artist.html?id='+ar.id; }
      }
      grid.innerHTML += '<div class="col-md-6 col-lg-4" data-animate><div class="review-card"><div class="d-flex align-items-center justify-content-between mb-2"><div class="review-card__stars">'+stars+'</div><span class="review-type-badge badge-'+rev.targetType+'">'+rev.targetType+'</span></div><p class="review-card__body">"'+rev.body+'"</p><div class="review-card__footer"><div><div class="review-card__author">'+rev.author+'</div><div class="review-card__date">'+rev.date+'</div></div><a href="'+targetLink+'" class="review-card__target">'+targetName+' <i class="fas fa-arrow-right ms-1"></i></a></div></div></div>';
    });
  });
  </script>
</body>
</html>
