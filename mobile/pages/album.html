<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album - MusicWorld</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/splash.css">
  <link rel="stylesheet" href="../css/album.css">
  <link rel="stylesheet" href="../css/player.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="splash-screen"><div class="splash__logo">Music<span>World</span></div><div class="splash__ring-wrap"><div class="splash__pulse"></div><i class="fas fa-music splash__icon"></i></div></div>
  <div id="navbar-placeholder"></div>

  <div class="modal fade" id="auth-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg">
      <div class="modal-header border-0 pb-0" style="background:var(--color-primary);border-radius:10px 10px 0 0;"><h5 class="modal-title text-white fw-bold"><i class="fas fa-music me-2"></i>MusicWorld</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body p-4">
        <div id="auth-prompt-msg" class="d-none alert alert-info py-2 small mb-3"></div>
        <ul class="nav nav-tabs mb-4"><li class="nav-item"><button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane">Sign In</button></li><li class="nav-item"><button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane">Register</button></li></ul>
        <div class="tab-content">
          <div class="tab-pane fade show active" id="login-pane"><div id="login-error" class="alert alert-danger d-none py-2 small"></div><form id="login-form"><div class="mb-3"><label class="form-label small fw-semibold">Email</label><input type="email" id="login-email" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Password</label><input type="password" id="login-password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button></form></div>
          <div class="tab-pane fade" id="register-pane"><div id="register-error" class="alert alert-danger d-none py-2 small"></div><form id="register-form"><div class="mb-3"><label class="form-label small fw-semibold">Username</label><input type="text" id="reg-username" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Email</label><input type="email" id="reg-email" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Password</label><input type="password" id="reg-password" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Confirm Password</label><input type="password" id="reg-confirm" class="form-control" required></div><button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Create Account</button></form></div>
        </div>
      </div>
    </div></div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100"><div id="download-toast" class="toast align-items-center text-bg-primary border-0"><div class="d-flex"><div class="toast-body"><i class="fas fa-download me-2"></i>Downloading album...</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>

  <!-- Album Hero -->
  <section class="album-hero" id="album-hero-section">
    <div class="album-hero__bg" id="album-hero-bg"></div>
    <div class="album-hero__overlay"></div>
    <div class="container" style="position:relative;z-index:2">
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb"><li class="breadcrumb-item"><a href="../index.html" class="text-white-50 text-decoration-none">Home</a></li><li class="breadcrumb-item active text-white">Album</li></ol>
      </nav>
      <div class="row align-items-end g-4">
        <div class="col-auto">
          <img id="album-cover" class="album-cover" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=300&q=80" alt="Album Cover">
        </div>
        <div class="col">
          <p class="text-white-50 small mb-1 text-uppercase fw-semibold">Album</p>
          <h1 class="album-title" id="album-title">Loading...</h1>
          <p class="album-meta">
            <a id="album-artist-link" href="#" class="text-white fw-semibold">—</a>
            &nbsp;&middot;&nbsp;<span id="album-year">—</span>
            &nbsp;&middot;&nbsp;<span id="album-tracks">—</span> tracks
          </p>
          <div class="album-actions">
            <button class="btn-play-album" id="btn-play-all"><i class="fas fa-play me-2"></i>Play All</button>
            <button class="btn-download-album" id="btn-download" data-download="album"><i class="fas fa-download me-2"></i>Download</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <main class="container py-5">
    <div class="row g-5">
      <div class="col-lg-7">
        <h2 class="section-title">Tracklist</h2>
        <ul class="tracklist" id="tracklist"></ul>
      </div>
      <div class="col-lg-5" data-animate>
        <h2 class="section-title">About this Album</h2>
        <p id="album-desc" class="text-muted" style="line-height:1.8"></p>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="music-player">
    <img id="player-art" class="player__art" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=80&q=60" alt="Now Playing">
    <div class="player__info"><div class="player__title" id="player-title">Select a track</div><div class="player__artist" id="player-artist">—</div></div>
    <div class="player__controls"><button id="player-prev-btn"><i class="fas fa-backward-step"></i></button><button id="player-play-btn"><i class="fas fa-play"></i></button><button id="player-next-btn"><i class="fas fa-forward-step"></i></button></div>
    <div class="player__volume"><i class="fas fa-volume-low"></i><input type="range" id="player-volume" min="0" max="1" step="0.05" value="0.8"></div>
  </div>

  <script src="../js/data/music-data.js"></script>
  <script src="../js/data/articles-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/player.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/splash.js"></script>
  <script>
  var ALBUM_IMGS = [
    'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&q=80',
    'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&q=80',
    'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=400&q=80',
    'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&q=80',
    'https://images.unsplash.com/photo-1415201364774-f6f0bb35f28f?w=400&q=80'
  ];

  document.addEventListener('DOMContentLoaded', async function() {
    await fetch('../pages/navbar.html').then(r=>r.text()).then(h=>{document.getElementById('navbar-placeholder').innerHTML=h;Auth.updateNavbar();var sf=document.getElementById('navbar-search-form');if(sf)sf.addEventListener('submit',function(e){e.preventDefault();var q=document.getElementById('navbar-search-input');if(q&&q.value.trim())window.location.href='search.html?q='+encodeURIComponent(q.value.trim());});});
    await fetch('../pages/footer.html').then(r=>r.text()).then(h=>{document.getElementById('footer-placeholder').innerHTML=h;});

    var id = new URLSearchParams(window.location.search).get('id');
    var albums = MusicData.albums || [];
    var albumIdx = albums.findIndex(function(a){return a.id===id;});
    var album = albumIdx >= 0 ? albums[albumIdx] : null;
    if (!album) { document.getElementById('album-title').textContent='Album not found'; return; }

    var artist = (MusicData.artists||[]).find(function(a){return a.id===album.artistId;});
    var img = ALBUM_IMGS[albumIdx % ALBUM_IMGS.length];

    document.title = album.title + ' - MusicWorld';
    var bg = document.getElementById('album-hero-bg');
    if(bg) bg.style.backgroundImage = 'url(' + img + ')';
    document.getElementById('album-cover').src = img;
    document.getElementById('album-title').textContent = album.title;
    document.getElementById('album-year').textContent = album.releaseDate.slice(0,4);
    document.getElementById('album-tracks').textContent = (album.songs||[]).length;
    document.getElementById('album-desc').textContent = album.description;
    if (artist) { var lnk=document.getElementById('album-artist-link'); lnk.textContent=artist.name; lnk.href='artist.html?id='+artist.id; }

    var tl = document.getElementById('tracklist');
    (album.songs||[]).forEach(function(song){
      tl.innerHTML += '<li class="tracklist__item" data-play="'+song.id+'" data-title="'+song.title+'" data-artist="'+(artist?artist.name:'')+'" data-cover="'+img+'"><span class="tracklist__num">'+song.trackNumber+'</span><i class="fas fa-play tracklist__play"></i><span class="tracklist__title">'+song.title+'</span><span class="tracklist__duration">'+song.duration+'</span></li>';
    });

    document.getElementById('btn-play-all').addEventListener('click', function(){
      if(album.songs&&album.songs.length){
        MWPlayer.setQueue(album.songs.map(function(s){return{id:s.id,title:s.title,artist:artist?artist.name:'',cover:img};}));
        MWPlayer.play({id:album.songs[0].id,title:album.songs[0].title,artist:artist?artist.name:'',cover:img});
      }
    });
    tl.addEventListener('click', function(e){
      var item=e.target.closest('.tracklist__item');
      if(!item) return;
      MWPlayer.play({id:item.dataset.play,title:item.dataset.title,artist:item.dataset.artist,cover:item.dataset.cover});
    });
  });
  </script>
</body>
</html>
