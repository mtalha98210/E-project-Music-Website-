<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles - MusicWorld</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/splash.css">
  <link rel="stylesheet" href="../css/player.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .articles-header {
      position: relative;
      padding: var(--space-xl) 0;
      color: var(--color-white);
      overflow: hidden;
      min-height: 200px;
      display: flex;
      align-items: center;
    }
    .articles-header__bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=1200&q=80') center/cover no-repeat;
      filter: brightness(0.3);
    }
    .articles-header__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(13,71,161,0.9) 0%, rgba(21,101,192,0.7) 100%);
    }
    .articles-header .container { position: relative; z-index: 2; }
    .articles-header h1 { color: var(--color-white); font-size: 2.2rem; font-weight: 800; }
    .article-card { background: var(--color-surface); border-radius: var(--radius-md); box-shadow: var(--shadow-card); overflow: hidden; height: 100%; display: flex; flex-direction: column; transition: transform var(--transition-normal), box-shadow var(--transition-normal); }
    .article-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .article-card__img { height: 200px; object-fit: cover; width: 100%; }
    .article-card__body { padding: var(--space-md); flex: 1; display: flex; flex-direction: column; }
    .article-card__category { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--color-primary); margin-bottom: var(--space-xs); }
    .article-card__title { font-size: 1.05rem; font-weight: 700; color: var(--color-text); margin-bottom: var(--space-sm); line-height: 1.4; }
    .article-card__summary { font-size: 0.875rem; color: var(--color-text-muted); line-height: 1.6; flex: 1; }
    .article-card__footer { display: flex; align-items: center; justify-content: space-between; margin-top: var(--space-md); padding-top: var(--space-sm); border-top: 1px solid var(--color-border); }
    .article-card__meta { font-size: 0.8rem; color: var(--color-text-muted); }
    .btn-read-more { font-size: 0.875rem; color: var(--color-primary); font-weight: 600; text-decoration: none; }
    .btn-read-more:hover { text-decoration: underline; }
    /* Article detail modal */
    .article-body-content p { margin-bottom: 1rem; line-height: 1.8; }
  </style>
</head>
<body>
  <div id="splash-screen"><div class="splash__logo">Music<span>World</span></div><div style="position:relative;display:flex;align-items:center;justify-content:center;"><div class="splash__pulse"></div><i class="fas fa-music splash__icon"></i></div></div>
  <div id="navbar-placeholder"></div>
  <div class="modal fade" id="auth-modal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title"><i class="fas fa-music me-2"></i>MusicWorld</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-4"><div id="auth-prompt-msg" class="d-none"></div><ul class="nav nav-tabs mb-4"><li class="nav-item"><button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane">Sign In</button></li><li class="nav-item"><button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane">Register</button></li></ul><div class="tab-content"><div class="tab-pane fade show active" id="login-pane"><div id="login-error" class="alert alert-danger d-none py-2 small"></div><form id="login-form"><div class="mb-3"><label class="form-label small fw-semibold">Email</label><input type="email" id="login-email" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Password</label><input type="password" id="login-password" class="form-control" required></div><button type="submit" class="btn btn-primary">Sign In</button></form></div><div class="tab-pane fade" id="register-pane"><div id="register-error" class="alert alert-danger d-none py-2 small"></div><form id="register-form"><div class="mb-3"><label class="form-label small fw-semibold">Username</label><input type="text" id="reg-username" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Email</label><input type="email" id="reg-email" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Password</label><input type="password" id="reg-password" class="form-control" required></div><div class="mb-3"><label class="form-label small fw-semibold">Confirm Password</label><input type="password" id="reg-confirm" class="form-control" required></div><button type="submit" class="btn btn-primary">Create Account</button></form></div></div></div></div></div></div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100"><div id="download-toast" class="toast align-items-center text-bg-primary border-0"><div class="d-flex"><div class="toast-body"><i class="fas fa-download me-2"></i>Downloading album...</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>

  <!-- Article Detail Modal -->
  <div class="modal fade" id="article-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4 pb-4">
          <p class="article-card__category" id="modal-category"></p>
          <h2 id="modal-title" class="mb-2"></h2>
          <p class="text-muted small mb-4" id="modal-meta"></p>
          <div class="article-body-content" id="modal-body"></div>
        </div>
      </div>
    </div>
  </div>

  <section class="articles-header">
    <div class="articles-header__bg"></div>
    <div class="articles-header__overlay"></div>
    <div class="container">
      <h1><i class="fas fa-newspaper me-2"></i>Articles</h1>
      <p class="text-white-50">Music history, culture, gear, and news.</p>
    </div>
  </section>

  <main class="container py-5">
    <div class="row g-4" id="articles-grid"></div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="music-player">
    <img id="player-art" class="player__art" src="../assets/images/placeholder.jpg" alt="Now Playing">
    <div class="player__info"><div class="player__title" id="player-title">Select a track</div><div class="player__artist" id="player-artist">—</div></div>
    <div class="player__controls"><button id="player-prev-btn"><i class="fas fa-backward-step"></i></button><button id="player-play-btn"><i class="fas fa-play"></i></button><button id="player-next-btn"><i class="fas fa-forward-step"></i></button></div>
    <div class="player__volume"><i class="fas fa-volume-low"></i><input type="range" id="player-volume" min="0" max="1" step="0.05" value="0.8"></div>
  </div>

  <script src="../js/data/music-data.js"></script>
  <script src="../js/data/articles-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/player.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/splash.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', async function() {
    await fetch('../pages/navbar.html').then(r=>r.text()).then(h=>{document.getElementById('navbar-placeholder').innerHTML=h;Auth.updateNavbar();});
    await fetch('../pages/footer.html').then(r=>r.text()).then(h=>{document.getElementById('footer-placeholder').innerHTML=h;});

    var grid = document.getElementById('articles-grid');
    (ArticlesData||[]).forEach(function(art){
      grid.innerHTML += '<div class="col-md-6 col-lg-4" data-animate><div class="article-card"><img class="article-card__img" src="../'+art.image+'" alt="'+art.title+'" onerror="this.src=\'../assets/images/placeholder.jpg\'"><div class="article-card__body"><p class="article-card__category">'+art.category+'</p><h3 class="article-card__title">'+art.title+'</h3><p class="article-card__summary">'+art.summary+'</p><div class="article-card__footer"><div class="article-card__meta"><i class="fas fa-user me-1"></i>'+art.author+' &middot; '+art.date+'</div><a href="#" class="btn-read-more" data-article-id="'+art.id+'">Read More <i class="fas fa-arrow-right ms-1"></i></a></div></div></div></div>';
    });

    document.addEventListener('click', function(e){
      var btn = e.target.closest('[data-article-id]');
      if (!btn) return;
      e.preventDefault();
      var art = (ArticlesData||[]).find(function(a){return a.id===btn.dataset.articleId;});
      if (!art) return;
      document.getElementById('modal-category').textContent = art.category.toUpperCase();
      document.getElementById('modal-title').textContent = art.title;
      document.getElementById('modal-meta').innerHTML = '<i class="fas fa-user me-1"></i>'+art.author+' &middot; '+art.date;
      document.getElementById('modal-body').innerHTML = art.body;
      new bootstrap.Modal(document.getElementById('article-modal')).show();
    });
  });
  </script>
</body>
</html>
